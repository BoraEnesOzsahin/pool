# Test datasource: in-memory H2 so `mvn test` runs without PostgreSQL.
spring.datasource.url=jdbc:h2:mem:dogecoin_pool_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# Initialize schema for tests too
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
