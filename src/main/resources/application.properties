spring.application.name=dogecoin_pool

# === Tatum Dogecoin testnet configuration (TESTNET ONLY) ===
tatum.doge.base-url=https://api.tatum.io
tatum.doge.api-key=${TATUM_DOGE_TESTNET_API_KEY}
tatum.doge.hot-address=${TATUM_DOGE_HOT_ADDRESS}
tatum.doge.hot-private-key=${TATUM_DOGE_HOT_PRIVATE_KEY}
tatum.doge.cold-address=${TATUM_DOGE_COLD_ADDRESS}
tatum.doge.min-sweep-doge=${TATUM_DOGE_MIN_SWEEP:10.0}
tatum.doge.reserve-doge=${TATUM_DOGE_RESERVE:60.0}
#
# One-shot generic DOGE sweep on startup:
DOGE_SWEEP_ON_STARTUP=true
#
# IMPORTANT: Use TESTNET-ONLY keys/addresses here.
# Never use mainnet keys.


