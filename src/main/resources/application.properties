
spring.application.name=pool_ser

# JPA / Hibernate (development defaults, safe for local only):
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
#
# PostgreSQL connection (set via env or override in a local profile):
# spring.datasource.url=jdbc:postgresql://localhost:5432/eth_sweeper
# spring.datasource.username=eth_sweeper
# spring.datasource.password=change_me
# spring.datasource.driver-class-name=org.postgresql.Driver

# Nonce lock uses a PostgreSQL table with pessimistic row locking.
# Make sure your datasource points to a DB that all instances share:
#
spring.datasource.url=jdbc:postgresql://localhost:5432/pool_ser
spring.datasource.username=postgres
spring.datasource.password=admin123
#
# Recommended: spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Optional: spring.jpa.show-sql=true (for debugging only)

# Environment variables (examples):
# ALCHEMY_HTTP_URL=https://eth-mainnet.g.alchemy.com/v2/<KEY>
# SWEEPER_HOT_KEY=0x<private_key_hex>
# SWEEPER_COLD_ADDRESS=0x<address>
# SWEEPER_ENABLED=true
# SWEEPER_POLL_MILLIS=300000         # 5 minutes
# SWEEPER_MIN_SWEEP_ETH=0.01         # do not sweep dust
# SWEEPER_MAX_GAS_GWEI=100           # safety cap for gas price
# SWEEPER_EXECUTE_ON_STARTUP=false   # optional one-shot behavior from previous step

# Receipt polling:
# SWEEPER_RECEIPT_POLL_ENABLED=true
# SWEEPER_RECEIPT_POLL_MILLIS=60000        # 1 minute
# SWEEPER_RECEIPT_MAX_RETRIES=3
# SWEEPER_RECEIPT_CONFIRMATION_BLOCKS=3    # optional, can be ignored in basic implementation

# Admin REST API (read-only):
#   GET /api/sweeps/recent
#   GET /api/sweeps/{id}
#   GET /api/sweeps/byStatus?status=...
#   GET /api/health/web3
#   GET /api/config
#
# IMPORTANT: protect these endpoints at the infrastructure level (VPN, firewall, reverse proxy),
# since they expose operational details and transaction history.

# AntPool API credentials are provided via environment variables:
# ANTPOOL_USER_ID=...
# ANTPOOL_API_KEY=...
# ANTPOOL_API_SECRET=...
# ANTPOOL_BASE_URL=https://antpool.com/api/v1
# ANTPOOL_DEFAULT_COIN=ETH