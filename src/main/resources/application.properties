# =========================
# Application Settings
# =========================
spring.application.name=stratum-proxy

# HTTP API Server
server.port=8081

# =========================
# Stratum Proxy Configuration
# =========================

# a) Local listening port for miners
stratum.server.host=0.0.0.0
stratum.server.port=3333

# b) Upstream pool configuration (AntPool XMR)
stratum.upstream.host=xmr.antpool.com
stratum.upstream.port=9005

# =========================
# Database Configuration
# =========================
# DISABLED: Stratum proxy doesn't need a database
# Only enable if you want to track shares in DB
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Uncomment below if you want to enable database:
#spring.datasource.url=jdbc:postgresql://localhost:5432/pooldb
#spring.datasource.username=pool_user
#spring.datasource.password=change_me_in_production
#spring.datasource.driver-class-name=org.postgresql.Driver
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================
# c) Logging Configuration
# =========================
logging.level.root=INFO
logging.level.com.ayrotek.pool=DEBUG
logging.level.com.ayrotek.pool.stratum=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# =========================
# Security (Development Mode - DISABLE IN PRODUCTION!)
# =========================
spring.security.user.name=admin
spring.security.user.password=admin
# Or disable security completely:
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# =========================
# Web3j (EVM) RPC Settings
# =========================
# IMPORTANT: Set an RPC endpoint from a node provider like Infura or Alchemy.
# Recommended: use an environment variable WEB3J_CLIENT_ADDRESS in prod.
# Example mainnet (replace YOUR_API_KEY):
#   https://mainnet.infura.io/v3/YOUR_API_KEY
# Example Sepolia testnet (replace YOUR_API_KEY):
#   https://sepolia.infura.io/v3/YOUR_API_KEY
web3j.client-address=${WEB3J_CLIENT_ADDRESS:https://sepolia.infura.io/v3/YOUR_API_KEY}

# Optional: EVM chain id (used when signing EIP-1559 txs). Sepolia = 11155111, Mainnet = 1
app.evm.chain-id=${EVM_CHAIN_ID:11155111}

# =========================
# Miner Settings
# =========================
# Miner payout threshold in ETH (e.g., 0.01 ETH)
#app.miner.payout-threshold=0.01