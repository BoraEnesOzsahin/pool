spring.application.name=dogecoin_pool

# === Database (PostgreSQL recommended) ===
# Provide these env vars to connect to Postgres:
# - DB_URL=jdbc:postgresql://localhost:5432/dogecoin_pool
# - DB_USERNAME=...
# - DB_PASSWORD=...
spring.datasource.url=
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin123}
# Defaults to local Postgres on port 5432 using database name `pool_ser`.
# Override with env vars if needed:
# - DB_URL=jdbc:postgresql://<host>:5432/pool_ser
# - DB_USERNAME=...
# - DB_PASSWORD=...

# Initialize schema from SQL file
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql

# === Tatum Ethereum Classic (ETC) testnet configuration (TESTNET ONLY) ===
tatum.etc.base-url=https://ethereum-classic-testnet.gateway.tatum.io
tatum.etc.api-key=
#${TATUM_ETC_TESTNET_API_KEY}
# The address derived from your private key (Sender)
tatum.etc.hot-address=
#${TATUM_ETC_HOT_ADDRESS}
tatum.etc.hot-private-key=
#${TATUM_ETC_HOT_PRIVATE_KEY}
# The destination address
tatum.etc.cold-address=
#${TATUM_ETC_COLD_ADDRESS}
tatum.etc.min-sweep-etc=0.001
#${TATUM_ETC_MIN_SWEEP:0.01}
tatum.etc.reserve-etc=0.02
#${TATUM_ETC_RESERVE:0.02}
#
# One-shot ETC sweep on startup:
ETC_SWEEP_ON_STARTUP=false

# Periodic ETC sweeping (runs every N ms, after an initial delay).
ETC_SWEEP_PERIODIC_ENABLED=true
ETC_SWEEP_FIXED_DELAY_MS=60000
ETC_SWEEP_INITIAL_DELAY_MS=15000
#
# IMPORTANT: Use TESTNET-ONLY keys/addresses here.
# Never use mainnet keys.
# ETC testnet addresses start with 0x (same format as Ethereum)
