spring.application.name=dogecoin_pool

# === Database (PostgreSQL recommended) ===
# Provide these env vars to connect to Postgres:
# - DB_URL=jdbc:postgresql://localhost:5432/dogecoin_pool
# - DB_USERNAME=...
# - DB_PASSWORD=...
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pool_ser}
spring.datasource.username=${DB_USERNAME:yourusername}
spring.datasource.password=${DB_PASSWORD:yourpassword}
# Defaults to local Postgres on port 5432 using database name `pool_ser`.
# Override with env vars if needed:
# - DB_URL=jdbc:postgresql://<host>:5432/pool_ser
# - DB_USERNAME=...
# - DB_PASSWORD=...

# Initialize schema from SQL file
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql

# electrs-compatible API base URL for testnet balance checks
electrs.doge.base-url=https://doge-electrs-testnet-demo.qed.me

# === Tatum Dogecoin testnet configuration (TESTNET ONLY) ===
tatum.doge.base-url=https://api.tatum.io
tatum.doge.api-key=${TATUM_DOGE_TESTNET_API_KEY}
tatum.doge.hot-address=${TATUM_DOGE_HOT_ADDRESS}
tatum.doge.hot-private-key=${TATUM_DOGE_HOT_PRIVATE_KEY}
tatum.doge.cold-address=${TATUM_DOGE_COLD_ADDRESS}
tatum.doge.min-sweep-doge=${TATUM_DOGE_MIN_SWEEP:10.0}
tatum.doge.reserve-doge=${TATUM_DOGE_RESERVE:450.0}
#
# One-shot generic DOGE sweep on startup:
DOGE_SWEEP_ON_STARTUP=false

# Periodic DOGE sweeping (runs every N ms, after an initial delay).
# Defaults are chosen to avoid triggering immediately during short-lived test runs.
DOGE_SWEEP_PERIODIC_ENABLED=true
DOGE_SWEEP_FIXED_DELAY_MS=15000
DOGE_SWEEP_INITIAL_DELAY_MS=15000
#
# IMPORTANT: Use TESTNET-ONLY keys/addresses here.
# Never use mainnet keys.


